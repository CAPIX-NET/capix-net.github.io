name: Link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Mondays at 09:00 UTC — catches external link rot
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install Jekyll and GitHub Pages gem
        run: |
          gem install bundler
          gem install github-pages

      - name: Build site
        run: jekyll build --destination _site
        env:
          JEKYLL_ENV: production

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Check internal HTML and external URLs in the built site, plus markdown sources.
          # --no-progress keeps logs readable in CI.
          # --accept treats common transient codes as success on external hosts.
          args: >-
            --no-progress
            --accept 200,206,429
            --max-concurrency 8
            --exclude-path _site/feed.xml
            './_site/**/*.html'
          fail: false
          format: detailed
