<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f9f9f9" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#333">CAPIX ERP Integration</text>

  <!-- CAPIX Centre Hub -->
  <rect x="290" y="145" width="220" height="90" rx="14" fill="#0078D4" stroke="#005a9e" stroke-width="2"/>
  <text x="400" y="182" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">CAPIX</text>
  <text x="400" y="206" text-anchor="middle" font-size="13" fill="#cce4f7">Treasury Software</text>

  <!-- Dynamics 365 (top left) -->
  <rect x="40" y="60" width="190" height="70" rx="10" fill="#fff" stroke="#0078D4" stroke-width="2"/>
  <text x="135" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#0078D4">Microsoft</text>
  <text x="135" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#0078D4">Dynamics 365</text>

  <!-- SAP (top right) -->
  <rect x="570" y="60" width="190" height="70" rx="10" fill="#fff" stroke="#1a73c7" stroke-width="2"/>
  <text x="665" y="102" text-anchor="middle" font-size="18" font-weight="700" fill="#1a73c7">SAP</text>

  <!-- FinanceOne (bottom left) -->
  <rect x="40" y="260" width="190" height="70" rx="10" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <text x="135" y="302" text-anchor="middle" font-size="16" font-weight="600" fill="#4a90d9">FinanceOne</text>

  <!-- Other ERPs (bottom right) -->
  <rect x="570" y="260" width="190" height="70" rx="10" fill="#fff" stroke="#888" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="665" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#666">Other ERPs</text>

  <!-- Azure (bottom centre) -->
  <rect x="305" y="310" width="190" height="65" rx="10" fill="#fff" stroke="#0078D4" stroke-width="2"/>
  <text x="400" y="338" text-anchor="middle" font-size="14" font-weight="600" fill="#0078D4">Microsoft Azure</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#666">Cloud Platform</text>

  <!-- Power Platform (top centre) -->
  <rect x="305" y="60" width="190" height="50" rx="10" fill="#fff" stroke="#742774" stroke-width="2"/>
  <text x="400" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#742774">Power BI / Power Automate</text>

  <!-- Connector lines -->
  <!-- CAPIX to Dynamics 365 -->
  <line x1="290" y1="170" x2="230" y2="120" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="230" y1="120" x2="290" y2="170" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- CAPIX to SAP -->
  <line x1="510" y1="170" x2="570" y2="120" stroke="#1a73c7" stroke-width="2.5"/>
  <circle cx="540" cy="145" r="4" fill="#1a73c7"/>

  <!-- CAPIX to FinanceOne -->
  <line x1="290" y1="215" x2="230" y2="270" stroke="#4a90d9" stroke-width="2.5"/>
  <circle cx="260" cy="242" r="4" fill="#4a90d9"/>

  <!-- CAPIX to Other ERPs -->
  <line x1="510" y1="215" x2="570" y2="270" stroke="#888" stroke-width="2" stroke-dasharray="6 3"/>
  <circle cx="540" cy="242" r="4" fill="#888"/>

  <!-- CAPIX to Azure -->
  <line x1="400" y1="235" x2="400" y2="310" stroke="#0078D4" stroke-width="2.5"/>
  <circle cx="400" cy="272" r="4" fill="#0078D4"/>

  <!-- CAPIX to Power Platform -->
  <line x1="400" y1="145" x2="400" y2="110" stroke="#742774" stroke-width="2"/>
  <circle cx="400" cy="128" r="4" fill="#742774"/>

  <!-- Data flow labels -->
  <text x="215" y="148" text-anchor="end" font-size="10" fill="#555">Cash positions</text>
  <text x="215" y="160" text-anchor="end" font-size="10" fill="#555">GL postings</text>

  <text x="585" y="148" text-anchor="start" font-size="10" fill="#555">Settlements</text>
  <text x="585" y="160" text-anchor="start" font-size="10" fill="#555">Transactions</text>

  <text x="215" y="248" text-anchor="end" font-size="10" fill="#555">Forecasts</text>
  <text x="215" y="260" text-anchor="end" font-size="10" fill="#555">Payments</text>

  <text x="585" y="248" text-anchor="start" font-size="10" fill="#555">Deal data</text>
  <text x="585" y="260" text-anchor="start" font-size="10" fill="#555">Reporting</text>

  <!-- Footer text -->
  <text x="400" y="405" text-anchor="middle" font-size="11" fill="#999">Built on Microsoft technology — integrates with your enterprise platform</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0078D4"/>
    </marker>
  </defs>
</svg>
